appId: ${APP_ID}
tags:
  - mobile
  - clipboard
  - smoke
---
- runFlow: helpers/open-clipboard-lab.yaml
- tapOn:
    id: maestro-copy-fixture-button
- assertVisible: "Fixture copied"
- tapOn:
    id: maestro-read-clipboard-button
- assertVisible:
    id: maestro-clipboard-text-output
    text: "Fixture Heading"
- assertVisible:
    id: maestro-clipboard-text-output
    text: "Fixture Subheading"
- assertVisible:
    id: maestro-clipboard-html-output
    text: "<h1>Fixture Heading</h1>"
- assertVisible:
    id: maestro-clipboard-html-output
    text: "<h2>Fixture Subheading</h2>"
