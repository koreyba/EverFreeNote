name: Build

on:
  push:
    branches: [main, develop, github-actions-setup]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Stage
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ENABLE_TEST_AUTH: ${{ vars.NEXT_PUBLIC_ENABLE_TEST_AUTH }}
      NEXT_PUBLIC_TEST_AUTH_EMAIL: ${{ secrets.NEXT_PUBLIC_TEST_AUTH_EMAIL }}
      NEXT_PUBLIC_TEST_AUTH_PASSWORD: ${{ secrets.NEXT_PUBLIC_TEST_AUTH_PASSWORD }}
      NEXT_PUBLIC_SKIP_AUTH_EMAIL: ${{ secrets.NEXT_PUBLIC_SKIP_AUTH_EMAIL }}
      NEXT_PUBLIC_SKIP_AUTH_PASSWORD: ${{ secrets.NEXT_PUBLIC_SKIP_AUTH_PASSWORD }}
    
    outputs:
      artifact-id: ${{ steps.artifact-upload.outputs.artifact-id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            ui/mobile/package-lock.json
      
      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix ui/mobile ci

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Validate main project
        id: validate_main
        continue-on-error: true
        run: npm run validate

      - name: Validate mobile package
        id: validate_mobile
        continue-on-error: true
        run: npm --prefix ui/mobile run validate

      - name: Run gitleaks scan
        if: always()
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      
      - name: Build project
        run: npm run build
      
      - name: Upload build artifact
        id: artifact-upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: build-${{ github.run_id }}
          path: ./out
          retention-days: 90
      
      - name: Output artifact info
        run: |
          echo "Artifact ID: build-${{ github.run_id }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "SHA: ${{ github.sha }}"
          echo "For Act local testing, use: build-${{ github.run_id }}"

      - name: Fail if validation checks failed
        if: always()
        run: |
          failed=0

          if [ "${{ steps.validate_main.outcome }}" != "success" ]; then
            echo "Main project validation failed."
            failed=1
          fi

          if [ "${{ steps.validate_mobile.outcome }}" != "success" ]; then
            echo "Mobile package validation failed."
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more validation checks failed."
            exit 1
          fi

