name: PR Android Build Trigger

on:
  issue_comment:
    types: [created, edited]

permissions:
  actions: write
  pull-requests: write
  issues: write
  contents: read

jobs:
  check-and-trigger:
    name: Parse Comment/Checkbox and Dispatch Build
    # Only run if comment is on a PR and matches command or checked box
    if: |
      github.event.issue.pull_request &&
      (
        (github.event.action == 'created' && (
          startsWith(github.event.comment.body, '/build-android stage') ||
          startsWith(github.event.comment.body, '/build-android prod')
        )) ||
        (github.event.action == 'edited' && (
          contains(github.event.comment.body, '- [x] 🚀 Build Stage Release APK') ||
          contains(github.event.comment.body, '- [x] 🚀 Build Prod Release APK')
        ))
      )
    runs-on: ubuntu-latest

    steps:
      - name: Add rocket reaction to comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions -f content='rocket'

      - name: Validate permissions and trigger build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_ACTION: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. Validate commenter/editor permissions
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${SENDER_LOGIN}/permission --jq .permission)
          
          if [ "$PERMISSION" != "write" ] && [ "$PERMISSION" != "admin" ]; then
            echo "Error: User $SENDER_LOGIN does not have permission to trigger builds."
            
            # Reset checkbox if it was an edit event so it doesn't stay checked
            if [ "$EVENT_ACTION" = "edited" ]; then
              NEW_BODY=$(echo "$COMMENT_BODY" | sed 's/- \[x\] 🚀 Build Stage Release APK/- \[ \] 🚀 Build Stage Release APK/g' | sed 's/- \[x\] 🚀 Build Prod Release APK/- \[ \] 🚀 Build Prod Release APK/g')
              gh api -X PATCH repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -f body="$NEW_BODY"
            fi
            
            gh pr comment $ISSUE_NUMBER -b "⚠️ @${SENDER_LOGIN}, you do not have permission to trigger Android builds. Only collaborators with write access can trigger this pipeline."
            exit 1
          fi

          # 2. Reset checkboxes in the status comment if edited
          if [ "$EVENT_ACTION" = "edited" ]; then
            NEW_BODY=$(echo "$COMMENT_BODY" | sed 's/- \[x\] 🚀 Build Stage Release APK/- \[ \] 🚀 Build Stage Release APK/g' | sed 's/- \[x\] 🚀 Build Prod Release APK/- \[ \] 🚀 Build Prod Release APK/g')
            gh api -X PATCH repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -f body="$NEW_BODY"
          fi

          # 3. Parse target environment from comment/checkbox
          if [[ "$COMMENT_BODY" == *"prod"* ]]; then
            ENV="prod"
          else
            ENV="stage"
          fi

          # 4. Get pull request head branch and ref info
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${ISSUE_NUMBER})
          HEAD_REF=$(echo "$PR_DATA" | jq -r .head.ref)
          HEAD_SHA=$(echo "$PR_DATA" | jq -r .head.sha)

          echo "PR Ref: $HEAD_REF"
          echo "PR SHA: $HEAD_SHA"
          echo "Target Environment: $ENV"

          # 5. Trigger the Android Build workflow on target branch
          gh workflow run android-build.yml --ref "$HEAD_REF" -f environment="$ENV"

          # 6. Fetch triggered run ID (wait a few seconds for registration)
          sleep 5
          RUN_ID=$(gh run list --workflow=android-build.yml --branch="$HEAD_REF" --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}"
            gh pr comment ${ISSUE_NUMBER} -b "🚀 Android **$ENV** build triggered for branch \`$HEAD_REF\` at commit SHA \`$HEAD_SHA\`! Check status of the build [here]($RUN_URL)."
          else
            gh pr comment ${ISSUE_NUMBER} -b "🚀 Android **$ENV** build triggered for branch \`$HEAD_REF\`! Go to the [Actions Tab](https://github.com/${{ github.repository }}/actions/workflows/android-build.yml) to see the build progress."
          fi
