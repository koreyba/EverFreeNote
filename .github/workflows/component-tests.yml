name: Component Tests

on:
  push:
    branches: [main, develop, github-actions-setup]
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  component-tests:
    runs-on: ubuntu-latest
    environment: Stage
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ENABLE_TEST_AUTH: ${{ vars.NEXT_PUBLIC_ENABLE_TEST_AUTH }}
      NEXT_PUBLIC_TEST_AUTH_EMAIL: ${{ secrets.NEXT_PUBLIC_TEST_AUTH_EMAIL }}
      NEXT_PUBLIC_TEST_AUTH_PASSWORD: ${{ secrets.NEXT_PUBLIC_TEST_AUTH_PASSWORD }}
      NEXT_PUBLIC_SKIP_AUTH_EMAIL: ${{ secrets.NEXT_PUBLIC_SKIP_AUTH_EMAIL }}
      NEXT_PUBLIC_SKIP_AUTH_PASSWORD: ${{ secrets.NEXT_PUBLIC_SKIP_AUTH_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        id: run-component-tests
        continue-on-error: true
        run: |
          mkdir -p cypress/results
          npm run test:component -- --reporter junit --reporter-options "mochaFile=cypress/results/component-tests-[hash].xml,toConsole=false"

      - name: Generate test summary
        if: always()
        env:
          COMPONENT_STEP_OUTCOME: ${{ steps.run-component-tests.outcome }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const outcome = process.env.COMPONENT_STEP_OUTCOME || 'unknown';
          const resultsDir = path.resolve('cypress', 'results');
          const screenshotsDir = path.resolve('cypress', 'screenshots');

          const counts = {
            total: 0,
            passed: 0,
            failed: 0,
            skipped: 0,
            durationSec: 0,
          };

          const failedTests = [];

          const decodeXml = (value = '') =>
            value
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'")
              .replace(/&#x([0-9a-fA-F]+);/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
              .replace(/&#([0-9]+);/g, (_, dec) => String.fromCharCode(parseInt(dec, 10)));

          const getAttr = (tag, name) => {
            const match = tag.match(new RegExp(`${name}="([^"]*)"`, 'i'));
            return match ? match[1] : '';
          };

          const toNumber = (value) => {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : 0;
          };

          const xmlFiles = fs.existsSync(resultsDir)
            ? fs.readdirSync(resultsDir)
                .filter((file) => file.endsWith('.xml'))
                .map((file) => path.join(resultsDir, file))
            : [];

          for (const xmlFile of xmlFiles) {
            const xml = fs.readFileSync(xmlFile, 'utf8');

            const suiteTags = xml.match(/<testsuite\b[^>]*>/g) || [];
            for (const suiteTag of suiteTags) {
              counts.total += toNumber(getAttr(suiteTag, 'tests'));
              counts.failed += toNumber(getAttr(suiteTag, 'failures'));
              counts.skipped += toNumber(getAttr(suiteTag, 'skipped'));
              counts.durationSec += toNumber(getAttr(suiteTag, 'time'));
            }

            const testcaseRegex = /<testcase\b[^>]*>[\s\S]*?<\/testcase>/g;
            let testcaseMatch = testcaseRegex.exec(xml);
            while (testcaseMatch) {
              const testcaseBlock = testcaseMatch[0];

              if (testcaseBlock.includes('<failure')) {
                const testcaseTagMatch = testcaseBlock.match(/<testcase\b[^>]*>/);
                const failureTagMatch = testcaseBlock.match(/<failure\b[^>]*>/);
                const failureTextMatch = testcaseBlock.match(/<failure\b[^>]*>([\s\S]*?)<\/failure>/);

                const testcaseTag = testcaseTagMatch ? testcaseTagMatch[0] : '';
                const failureTag = failureTagMatch ? failureTagMatch[0] : '';

                const rawMessage =
                  (failureTextMatch && failureTextMatch[1]) ||
                  getAttr(failureTag, 'message') ||
                  'No failure message captured';

                const message = decodeXml(rawMessage)
                  .split('\n')
                  .map((line) => line.trim())
                  .find(Boolean) || 'No failure message captured';

                failedTests.push({
                  suite: decodeXml(getAttr(testcaseTag, 'classname')) || 'unknown-suite',
                  name: decodeXml(getAttr(testcaseTag, 'name')) || 'unknown test',
                  file: decodeXml(getAttr(testcaseTag, 'file')) || path.relative(process.cwd(), xmlFile),
                  message,
                });
              }

              testcaseMatch = testcaseRegex.exec(xml);
            }
          }

          counts.passed = Math.max(counts.total - counts.failed - counts.skipped, 0);
          const headline = outcome === 'success' ? 'Component Tests Passed' : 'Component Tests Failed';

          let md = '';
          md += `## ${headline}\n\n`;
          md += '| Metric | Count |\n';
          md += '|---|---:|\n';
          md += `| Tests (total) | ${counts.total} |\n`;
          md += `| Tests (passed) | ${counts.passed} |\n`;
          md += `| Tests (failed) | ${counts.failed} |\n`;
          md += `| Tests (skipped) | ${counts.skipped} |\n`;
          md += `| Duration (seconds) | ${counts.durationSec.toFixed(2)} |\n\n`;

          if (xmlFiles.length === 0) {
            md += 'JUnit report files were not found in `cypress/results`.\n\n';
          }

          if (failedTests.length > 0) {
            md += '<details>\n';
            md += `<summary>Failed tests (${failedTests.length})</summary>\n\n`;
            for (const test of failedTests.slice(0, 30)) {
              md += `- **${test.suite} > ${test.name}**  \n`;
              md += `  \`${test.file}\`  \n`;
              md += `  ${test.message}\n`;
            }
            if (failedTests.length > 30) {
              md += `\n- ... and ${failedTests.length - 30} more\n`;
            }
            md += '\n</details>\n\n';
          }

          if (fs.existsSync(screenshotsDir)) {
            const screenshots = fs
              .readdirSync(screenshotsDir, { recursive: true })
              .filter((entry) => typeof entry === 'string' && entry.endsWith('.png'))
              .slice(0, 15);

            if (screenshots.length > 0) {
              md += '<details>\n';
              md += `<summary>Failed test screenshots (${screenshots.length})</summary>\n\n`;
              for (const shot of screenshots) {
                md += `- \`cypress/screenshots/${shot}\`\n`;
              }
              md += '\n</details>\n';
            }
          }

          fs.appendFileSync(summaryFile, md);
          NODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: component-test-results-${{ github.run_id }}
          path: |
            cypress/results
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore
          retention-days: 30

      - name: Generate component Allure report
        if: always()
        run: |
          if [ -d allure-results/component ] && [ "$(find allure-results/component -type f | wc -l)" -gt 0 ]; then
            npm run allure:generate:component
          else
            echo "No component Allure results found; skipping report generation."
          fi

      - name: Upload component Allure artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: component-test-allure-${{ github.run_id }}
          path: |
            allure-results/component
            allure-report/component
          if-no-files-found: ignore
          retention-days: 30

      - name: Mark job as failed when component tests failed
        if: steps.run-component-tests.outcome != 'success'
        run: exit 1

  publish-component-report:
    name: Publish Component Allure report
    needs: component-tests
    if: always() && needs.component-tests.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-allure-publish
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      PAGES_BASE_URL: https://koreyba.github.io/EverFreeNote
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REF_NAME: ${{ github.head_ref || github.ref_name }}
      COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      FAMILY_OUTCOME: ${{ needs.component-tests.result == 'success' && 'success' || 'failure' }}
      WORKFLOW_NAME: Component Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Download component Allure artifact
        uses: actions/download-artifact@v7
        with:
          name: component-test-allure-${{ github.run_id }}
          path: .artifacts/component

      - name: Prepare gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf .pages-existing
          git init --quiet .pages-existing
          git -C .pages-existing config user.name "github-actions[bot]"
          git -C .pages-existing config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .pages-existing remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git -C .pages-existing fetch --quiet --depth=1 origin gh-pages; then
            git -C .pages-existing checkout --quiet -B gh-pages FETCH_HEAD
          else
            git -C .pages-existing checkout --quiet --orphan gh-pages
            find .pages-existing -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Restore component history
        run: |
          set -euo pipefail

          rm -rf .allure-history
          mkdir -p .allure-history/_history

          if [ -d .pages-existing/_history/component ]; then
            cp -R .pages-existing/_history/component .allure-history/_history/component
          fi

      - name: Build component family report
        id: prepare-component-report
        run: |
          node scripts/prepare-allure-family-report.js \
            --family component \
            --work-dir .allure-publish/component \
            --history-root .allure-history \
            --input component=.artifacts/component/allure-results/component \
            --github-output "$GITHUB_OUTPUT"

      - name: Update gh-pages content
        if: steps.prepare-component-report.outputs.has_results == 'true'
        run: |
          set -euo pipefail

          report_dir="${{ steps.prepare-component-report.outputs.report_dir }}"
          report_output_dir="${{ steps.prepare-component-report.outputs.report_output_dir }}"
          history_path="${{ steps.prepare-component-report.outputs.history_path }}"
          metadata_path="${{ steps.prepare-component-report.outputs.metadata_path }}"

          rm -rf ".pages-existing/${report_dir}"
          parent_dir="$(dirname ".pages-existing/${report_dir}")"
          mkdir -p "${parent_dir}"
          cp -R "${report_output_dir}" ".pages-existing/${report_dir}"

          if [ -n "${history_path}" ] && [ -f ".allure-history/${history_path}" ]; then
            mkdir -p ".pages-existing/$(dirname "${history_path}")"
            cp ".allure-history/${history_path}" ".pages-existing/${history_path}"
          fi

          node scripts/generate-allure-report-index.js \
            --existing .pages-existing/reports/index.json \
            --current "${metadata_path}" \
            --output .pages-existing \
            --template .github/pages/allure-reports-index.html \
            --limit-per-family 20

          node scripts/prune-allure-pages.js \
            --root .pages-existing \
            --reports-list .pages-existing/reports/retained-paths.txt \
            --history-list .pages-existing/reports/retained-history-paths.txt

      - name: Push gh-pages updates
        if: steps.prepare-component-report.outputs.has_results == 'true'
        env:
          REPORT_URL: ${{ steps.prepare-component-report.outputs.report_url }}
        run: |
          set -euo pipefail

          if [ -n "$(git -C .pages-existing status --porcelain)" ]; then
            git -C .pages-existing add .
            git -C .pages-existing commit -m "Publish component Allure report for run ${GITHUB_RUN_ID}"
            git -C .pages-existing push origin HEAD:gh-pages
          else
            echo "No gh-pages changes to push."
          fi

          {
            echo "## Component Allure Report"
            echo
            echo "- Published report: ${REPORT_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
