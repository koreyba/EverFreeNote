              }
            }
          }

          const missingReports = reportPaths.filter((relativeReportPath) => !fs.existsSync(path.resolve(relativeReportPath)));
          const headline = primaryOutcome === 'success' ? `${title} Passed` : `${title} Failed`;

          let md = '';
          md += `## ${headline}\n\n`;
          md += '| Metric | Count |\n';
          md += '|---|---:|\n';
          md += `| Test Suites (total) | ${counts.suitesTotal} |\n`;
          md += `| Test Suites (passed) | ${counts.suitesPassed} |\n`;
          md += `| Test Suites (failed) | ${counts.suitesFailed} |\n`;
          md += `| Tests (total) | ${counts.testsTotal} |\n`;
          md += `| Tests (passed) | ${counts.testsPassed} |\n`;
          md += `| Tests (failed) | ${counts.testsFailed} |\n`;
          md += `| Tests (skipped) | ${counts.testsPending} |\n`;
          md += `| Tests (todo) | ${counts.testsTodo} |\n\n`;

          if (missingReports.length > 0) {
            md += 'Missing Jest JSON reports:\n';
            for (const reportPath of missingReports) {
              md += `- \`${reportPath}\`\n`;
            }
            md += '\n';
          }

          if (failedTests.length > 0) {
            md += '<details>\n';
            md += `<summary>Failed tests (${failedTests.length})</summary>\n\n`;
            for (const test of failedTests.slice(0, 30)) {
              md += `- **${test.fullName}**  \n`;
              md += `  \`${test.file}\`  \n`;
              md += `  ${test.message}\n`;
            }
            if (failedTests.length > 30) {
              md += `\n- ... and ${failedTests.length - 30} more\n`;
            }
            md += '\n</details>\n';
          }

          fs.appendFileSync(summaryFile, md);
          NODE

      - name: Upload code test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-code-${{ github.run_id }}
          path: |
            core-unit-results.json
            core-integration-results.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Mark job as failed when code tests failed
        if: steps.run-core-unit-tests.outcome != 'success' || steps.run-core-integration-tests.outcome != 'success'
        run: exit 1

