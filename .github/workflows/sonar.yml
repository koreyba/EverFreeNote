name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube-pr:
    name: SonarQube PR analysis
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Keep PR feedback close to Automatic Analysis: scan new code on every
      # update, but do not install dependencies or run coverage suites.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  unit-coverage:
    name: Jest coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Jest coverage
        id: run-jest-coverage
        continue-on-error: true
        run: npm run test:unit:coverage

      - name: Verify Jest LCOV
        id: verify-jest-lcov
        if: always()
        run: test -s coverage/jest/lcov.info

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-coverage-${{ github.run_id }}
          path: coverage/jest
          if-no-files-found: error
          retention-days: 14

      - name: Fail Jest coverage job when tests or report failed
        if: always() && (steps.run-jest-coverage.outcome != 'success' || steps.verify-jest-lcov.outcome != 'success')
        run: exit 1

  component-coverage:
    name: Cypress component coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Cypress binary
        run: npx --no-install cypress install

      - name: Run Cypress component coverage
        id: run-cypress-coverage
        continue-on-error: true
        run: npm run test:component:coverage

      - name: Render Cypress component report
        if: always()
        run: npm run coverage:component

      - name: Verify Cypress LCOV
        id: verify-cypress-lcov
        if: always()
        run: test -s coverage/component/lcov.info

      - name: Upload Cypress component coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: component-coverage-${{ github.run_id }}
          path: coverage/component
          if-no-files-found: error
          retention-days: 14

      - name: Fail Cypress coverage job when tests or report failed
        if: always() && (steps.run-cypress-coverage.outcome != 'success' || steps.verify-cypress-lcov.outcome != 'success')
        run: exit 1

  mobile-coverage:
    name: Mobile Jest coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install mobile dependencies
        run: npm --prefix ui/mobile ci --ignore-scripts

      - name: Run mobile Jest coverage
        id: run-mobile-coverage
        continue-on-error: true
        run: npm --prefix ui/mobile run test:coverage -- --ci

      - name: Verify mobile Jest LCOV
        id: verify-mobile-lcov
        if: always()
        run: test -s ui/mobile/coverage/lcov.info

      - name: Upload mobile Jest coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mobile-coverage-${{ github.run_id }}
          path: ui/mobile/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Fail mobile coverage job when tests or report failed
        if: always() && (steps.run-mobile-coverage.outcome != 'success' || steps.verify-mobile-lcov.outcome != 'success')
        run: exit 1

  sonarqube-main:
    name: SonarQube main analysis
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-coverage, component-coverage, mobile-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Jest coverage report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: jest-coverage-${{ github.run_id }}
          path: coverage/jest

      - name: Download Cypress component coverage report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: component-coverage-${{ github.run_id }}
          path: coverage/component

      - name: Download mobile Jest coverage report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: mobile-coverage-${{ github.run_id }}
          path: ui/mobile/coverage

      - name: Verify imported LCOV reports
        if: always()
        continue-on-error: true
        run: |
          test -s coverage/jest/lcov.info
          test -s coverage/component/lcov.info
          test -s ui/mobile/coverage/lcov.info

      - name: Detect available LCOV reports
        id: detect-lcov
        if: always()
        run: |
          set -euo pipefail

          reports=()
          for report in coverage/jest/lcov.info coverage/component/lcov.info ui/mobile/coverage/lcov.info; do
            if [ -s "$report" ]; then
              reports+=("$report")
            fi
          done

          if [ "${#reports[@]}" -gt 0 ]; then
            report_paths=$(IFS=,; echo "${reports[*]}")
            echo "sonar_args=-Dsonar.javascript.lcov.reportPaths=${report_paths}" >> "$GITHUB_OUTPUT"
            echo "Using LCOV reports: ${report_paths}"
          else
            echo "sonar_args=" >> "$GITHUB_OUTPUT"
            echo "No LCOV reports available; running SonarQube without coverage."
          fi

      - name: SonarQube Scan with coverage
        if: always()
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: ${{ steps.detect-lcov.outputs.sonar_args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
