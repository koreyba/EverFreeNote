sonar.projectKey=koreyba_EverFreeNote
sonar.organization=koreyba
sonar.projectName=EverFreeNote
sonar.sourceEncoding=UTF-8

# Keep CI-based static analysis close to the previous Automatic Analysis scope.
# Test inclusions are automatically excluded from the production-source set.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**,cypress/**,**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.jsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/build/**,**/out/**,coverage/**,allure-report/**,allure-results/**,.nyc_output/**,.scannerwork/**,.worktrees/**,**/tests/**,cypress/**,**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.jsx,**/*.spec.ts,**/*.spec.tsx

# Root Jest, Cypress, and mobile Jest own coverage for the product code. Other
# production areas remain statically analyzed but do not dilute this metric
# until they have a dedicated coverage producer.
sonar.coverage.exclusions=supabase/**,scripts/**,db_audit_scripts/**,extensions/**,cypress/**,tests/**,**/tests/**,**/*.config.js,**/*.config.cjs,**/*.config.mjs,**/*.config.ts,**/*.d.ts

sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.tests.json,ui/mobile/tsconfig.sonar.json
sonar.javascript.node.maxspace=8096
